<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Profile Banner - Alex Spelucin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      background: #f4fdff;
    }
    .banner {
      width: 1584px;
      height: 396px;
      position: relative;
      background:
        radial-gradient(ellipse at 80% 20%, rgba(21, 96, 189, 0.06), transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(21, 96, 189, 0.04), transparent 50%),
        linear-gradient(135deg, #f4fdff 0%, #eaf6ff 100%);
      background-image:
        radial-gradient(circle, rgba(21, 96, 189, 0.035) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 24px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 80px;
    }
    .content {
      text-align: right;
      max-width: 1100px;
      margin-left: auto;
    }
    .eyebrow {
      font-size: 14px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: rgba(21, 96, 189, 0.5);
      margin-bottom: 20px;
    }
    .headline {
      font-size: 56px;
      font-weight: 700;
      color: #1560bd;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 16px;
    }
    .subheadline {
      font-size: 22px;
      font-weight: 400;
      color: #0d4a9e;
      line-height: 1.5;
      opacity: 0.7;
    }
    .logo {
      position: absolute;
      bottom: 32px;
      right: 80px;
      opacity: 0.5;
    }
    .accent-line {
      position: absolute;
      top: 0;
      right: 0;
      width: 6px;
      height: 100%;
      background: linear-gradient(180deg, #1560bd 0%, rgba(21, 96, 189, 0.1) 100%);
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="accent-line"></div>
    <div class="content">
      <div class="eyebrow">Consultor Independiente</div>
      <div class="headline">SEO Técnico para Shopify</div>
      <div class="subheadline">Auditorias, arquitectura de catalogo y sistemas de medicion<br>para tiendas que quieren crecer con criterio</div>
    </div>
    <div class="logo">
      <svg width="48" height="48" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M 128 192 C 92.654 192 64 220.654 64 256 L 0 256 C 0 185.308 57.308 128 128 128 Z M 256 128 C 256 198.692 198.692 256 128 256 L 128 192 C 163.346 192 192 163.346 192 128 Z M 128 64 C 92.654 64 64 92.654 64 128 L 0 128 C 0 57.308 57.308 0 128 0 Z M 256 0 C 256 70.692 198.692 128 128 128 L 128 64 C 163.346 64 192 35.346 192 0 Z" fill="#1560bd"/>
      </svg>
    </div>
  </div>
</body>
</html>

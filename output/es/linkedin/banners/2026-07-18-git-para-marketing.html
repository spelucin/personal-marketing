<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, height=667">
  <title>Git para Marketing - Banner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 667px;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      background: #f4fdff;
    }

    .banner {
      width: 1200px;
      height: 667px;
      position: relative;
      background: linear-gradient(135deg, #f4fdff 0%, #eaf6ff 100%);
      background-image:
        radial-gradient(circle, rgba(21, 96, 189, 0.035) 1px, transparent 1px);
      background-size: 24px 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 80px;
    }

    .eyebrow {
      font-size: 14px;
      font-weight: 500;
      color: rgba(21, 96, 189, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      margin-bottom: 20px;
    }

    .headline {
      font-size: 52px;
      font-weight: 700;
      color: #1560bd;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 20px;
    }

    .subheadline {
      font-size: 24px;
      font-weight: 400;
      color: rgba(21, 96, 189, 0.7);
      line-height: 1.4;
      max-width: 600px;
    }

    .code-snippet {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-top: 28px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 400;
      color: #1560bd;
      background: rgba(21, 96, 189, 0.06);
      border: 1px solid rgba(21, 96, 189, 0.1);
      border-radius: 8px;
      padding: 10px 20px;
    }

    .code-cursor {
      width: 2px;
      height: 20px;
      background: #1560bd;
      opacity: 0.5;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 0; }
    }

    .monogram {
      position: absolute;
      bottom: 40px;
      right: 56px;
      width: 44px;
      height: 44px;
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="eyebrow">HERRAMIENTAS PARA MARKETING</div>
    <div class="headline">Git para Marketing:<br>No pierdas tu trabajo</div>
    <div class="subheadline">Control de versiones, commits, push, pull, checkout, rebase, reset. Lo que necesitas saber.</div>
    <div class="code-snippet">
      <span>$ git init</span>
      <span class="code-cursor"></span>
    </div>
    <svg class="monogram" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 10 A40 40 0 0 1 90 50" stroke="#1560bd" stroke-width="3" fill="none"/>
      <path d="M90 50 A40 40 0 0 1 50 90" stroke="#1560bd" stroke-width="3" fill="none"/>
      <path d="M50 90 A40 40 0 0 1 10 50" stroke="#1560bd" stroke-width="3" fill="none"/>
      <path d="M10 50 A40 40 0 0 1 50 10" stroke="#1560bd" stroke-width="3" fill="none"/>
    </svg>
  </div>
</body>
</html>

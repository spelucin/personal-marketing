<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, height=630">
  <title>OG Image</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      background: #f4fdff;
      position: relative;
    }

    .dot-grid {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(21, 96, 189, 0.14) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    .gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(244, 253, 255, 0) 0%, rgba(21, 96, 189, 0.05) 100%);
    }

    .glow {
      position: absolute;
      width: 640px;
      height: 640px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(21, 96, 189, 0.12) 0%, transparent 70%);
      top: -220px;
      right: -180px;
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 72px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #1560bd;
    }

    .eyebrow::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #1560bd;
    }

    .title {
      font-size: 64px;
      font-weight: 700;
      line-height: 1.08;
      color: #0d1f3c;
      letter-spacing: -0.03em;
      max-width: 920px;
      margin-top: 28px;
    }

    .description {
      font-size: 25px;
      font-weight: 400;
      line-height: 1.55;
      color: rgba(13, 31, 60, 0.6);
      max-width: 760px;
      margin-top: 24px;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand-name {
      font-size: 18px;
      font-weight: 700;
      color: #0d1f3c;
      letter-spacing: -0.01em;
    }

    .brand-domain {
      font-size: 15px;
      font-weight: 500;
      color: rgba(21, 96, 189, 0.55);
    }

    .rule {
      width: 100%;
      height: 1px;
      background: rgba(21, 96, 189, 0.14);
      margin-bottom: 28px;
    }
  </style>
</head>
<body>
  <div id="og-image" data-eyebrow="SEO técnico para Shopify" data-title="Alex Spelucin" data-description="Consultor independiente de SEO técnico para Shopify.">
    <div class="dot-grid"></div>
    <div class="gradient"></div>
    <div class="glow"></div>

    <div class="container">
      <div>
        <div class="eyebrow" id="eyebrow-text">SEO técnico para Shopify</div>
        <div class="title" id="title-text">Alex Spelucin</div>
        <div class="description" id="description-text">Consultor independiente de SEO técnico para Shopify.</div>
      </div>

      <div>
        <div class="rule"></div>
        <div class="footer">
          <div class="brand">
            <svg class="logo" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
              <path d="M 128 192 C 92.654 192 64 220.654 64 256 L 0 256 C 0 185.308 57.308 128 128 128 Z M 256 128 C 256 198.692 198.692 256 128 256 L 128 192 C 163.346 192 192 163.346 192 128 Z M 128 64 C 92.654 64 64 92.654 64 128 L 0 128 C 0 57.308 57.308 0 128 0 Z M 256 0 C 256 70.692 198.692 128 128 128 L 128 64 C 163.346 64 192 35.346 192 0 Z" fill="#1560bd"/>
            </svg>
            <div class="brand-text">
              <div class="brand-name">Alex Spelucin</div>
              <div class="brand-domain">spelucin.pro</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const container = document.getElementById('og-image');
    document.getElementById('eyebrow-text').textContent = container.dataset.eyebrow;
    document.getElementById('title-text').textContent = container.dataset.title;
    document.getElementById('description-text').textContent = container.dataset.description;
  </script>
</body>
</html>
